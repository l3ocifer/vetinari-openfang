---
# Vetinari high-frequency subagent loop.
#
# Vetinari's existing schedules are big-context daily/weekly synthesis
# passes that timed out under the chat-window limit. The pattern fix:
#
#   1. Many small frequent schedules append rolling state to one file
#      at /data/graphs/vetinari/pages/world/dashboard.md.
#   2. Daily synthesis (state-of-the-union, strategic-outlook) reads
#      that dashboard instead of scanning every sibling graph from
#      scratch. Context drops from O(7 graphs) to O(1 page).
#
# This Job (one-shot, idempotent) seeds the high-frequency half:
#
#   sibling-pulse        every 15m  who-did-what-recently per agent
#   fleet-events-tail    every  5m  surface P0/P1 fleet_events
#   open-loops-scan      every 30m  open-loops table + leo aging
#   bench-watch          every 30m  poll Quirm bench.findings unseen
#   kanban-tick          DISABLED    (see below — mission dispatch moved out)
#   drift-detect         every  2h  compare current vs last snapshot
#
# Mission board: /data/graphs/vetinari/pages/missions.md. Mechanical
# dispatch/reconcile/stall-chase is owned by the DETERMINISTIC
# `mission-orchestrator` CronJob in the homelab repo
# (argocd/apps/_agents/mission-orchestrator/), NOT by an LLM schedule:
# the OpenFang builtin:chat runtime gates shell_exec behind a human
# approval prompt (no exec_policy) and the subprocess metacharacter guard
# rejects the inline curl/psql JSON the dispatch needs, while file_write
# is sandboxed away from /data/graphs. The agent keeps only LLM synthesis
# (writing its own deliverable pages). `kanban-tick` is therefore disabled
# here and `open-loops-scan` no longer chases mission stalls (the CronJob
# does). See homelab/openclaw-configs/shared/skills/a2a-task-routing.
#
# All run with model_override="chat" (cheap, 32k window). Per-job
# timeout_secs are sized to the agentic tool-loop length (150-300s),
# not the per-call latency — the original flat 60-90s budgets caused
# repeated "timed out after 60s" auto-disables (2026-05-31). Re-running
# the Job is safe: it deletes any schedule with a matching name first,
# then re-creates from this list.
apiVersion: batch/v1
kind: Job
metadata:
  name: vetinari-seed-schedules
  namespace: agents-shared
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vetinari-seed-schedules
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: python:3.12-slim
          command: ["sh", "-c"]
          env:
            - name: OPENFANG_API_KEY
              valueFrom:
                secretKeyRef: { name: vetinari-secrets, key: A2A_BEARER_TOKEN }
          args:
            - |
              set -eu
              pip install --quiet --no-cache-dir 'httpx==0.28.*'

              # The OpenFang API requires an API key for non-loopback
              # requests, including in-cluster schedule seeding.
              cat > /tmp/seed.py <<'PY'
              import json, os, sys, time
              import httpx
              BASE = os.environ.get("VETINARI_API", "http://vetinari.agents-shared.svc.cluster.local:4200")
              API_KEY = os.environ["OPENFANG_API_KEY"]
              HEADERS = {"Authorization": f"Bearer {API_KEY}"}

              # Wait until /api/schedules answers (Vetinari may still be
              # rolling). 60-attempt budget at 5s each = 5min.
              for attempt in range(60):
                  try:
                      r = httpx.get(f"{BASE}/api/schedules", headers=HEADERS, timeout=5)
                      r.raise_for_status()
                      schedules = r.json()["schedules"]
                      break
                  except Exception as e:
                      if attempt == 59:
                          raise
                      print(f"waiting for vetinari api ({attempt+1}/60): {e}", flush=True)
                      time.sleep(5)

              if not schedules:
                  print("ERROR: vetinari has no existing schedules — agent_id unknown", file=sys.stderr)
                  sys.exit(2)

              agent_id = schedules[0]["agent_id"]
              print(f"vetinari agent_id = {agent_id}", flush=True)

              DESIRED = [
                  # ─── Daily/weekly synthesis (frontier-pinned) ───
                  # These were the old synthesis schedules; now upgraded
                  # to read the rolling dashboard.md (built by the
                  # high-frequency loop below) instead of re-scanning
                  # every sibling graph from scratch. Output context
                  # stays well under frontier's 64 K input ceiling.
                  {
                      "name": "state-of-the-union",
                      "cron": "0 22 * * *",
                      # Claude Sonnet via the Max subscription. Bridge gates
                      # against the household 7-window quota; falls back to
                      # `chat-thebeast` then `frontier-blade` (LiteLLM map)
                      # if Claude is throttled or refused. See homelab
                      # argocd/apps/_inference/55-claude-bridge.yaml.
                      "model_override": "claude-sonnet-max",
                      "timeout_secs": 600,
                      "enabled": True,
                      "message": (
                          "DAILY SYNTHESIS (Claude Sonnet via Max subscription, falls back to local frontier on quota throttle). "
                          "Read /data/graphs/vetinari/pages/world/dashboard.md "
                          "(built every 15 min by sibling-pulse, fleet-events-tail, "
                          "open-loops-scan, bench-watch). "
                          "Synthesize today across the four lanes "
                          "(cluster, businesses, personal, coordination). "
                          "Write the result to /data/graphs/leo/pages/world/state-of-the-union.md "
                          "(overwrite). Then post a 5-bullet summary to the homelab Matrix room."
                      ),
                  },
                  {
                      "name": "strategic-outlook",
                      "cron": "15 6 * * *",
                      # Claude Sonnet via Max — the morning brief is the
                      # single most important output of the day, paid model
                      # is justified.
                      "model_override": "claude-sonnet-max",
                      "timeout_secs": 600,
                      "enabled": True,
                      "message": (
                          "MORNING STRATEGIC OUTLOOK (Claude Sonnet via Max subscription, falls back to local frontier on quota throttle). "
                          "Read /data/graphs/vetinari/pages/world/dashboard.md and "
                          "/data/graphs/leo/pages/world/state-of-the-union.md (yesterday's snapshot). "
                          "Synthesize the next 24h across Sancho (personal), Frack (business ops), "
                          "Frick (cluster), and open-loops. Identify the top 3 things Leo should "
                          "do today and the top 3 risks to surface. "
                          "Write to /data/graphs/leo/pages/world/strategic-outlook.md (overwrite). "
                          "Send a concise 4-line iMessage to Leo via BlueBubbles."
                      ),
                  },
                  {
                      "name": "weekly-system-review",
                      "cron": "0 9 * * 1",
                      # Claude Opus via Max — the only weekly Opus job in
                      # the fleet. Burns ~1/4 of the household weekly opus
                      # quota in one shot; bridge enforces the
                      # seven_day_opus 0.85 hard ceiling so this self-limits.
                      "model_override": "claude-opus-max",
                      "timeout_secs": 1200,
                      "enabled": True,
                      "message": (
                          "WEEKLY SYSTEM REVIEW (Claude Opus via Max subscription, deepest pass; falls back to local frontier on quota throttle). "
                          "Read all daily state-of-the-union snapshots from the past 7 days at "
                          "/data/graphs/leo/pages/world/state-of-the-union*.md (or "
                          "/data/graphs/vetinari/journals/ if archived). "
                          "Review: (1) heartbeat health per agent, (2) open-loop throughput "
                          "(opened vs closed, median age), (3) any KILLSWITCH events, "
                          "(4) cross-agent handoffs that succeeded vs broke, "
                          "(5) coordination decisions and their outcomes. "
                          "Write to /data/graphs/leo/pages/world/weekly-review-$(date +%%Y-W%%U).md "
                          "and post a Matrix #homelab summary."
                      ),
                  },
                  {
                      "name": "killswitch-drift-check",
                      "cron": "0 2 * * 1",
                      "model_override": "frontier",
                      "timeout_secs": 600,
                      "enabled": True,
                      "message": (
                          "WEEKLY KILLSWITCH DRIFT CHECK (frontier model). "
                          "For each sibling (frick, frack, sancho, quirm, vimes, puck): "
                          "read /data/graphs/$AGENT/SOUL.md, KILLSWITCH.md, and the live config "
                          "(fetched via `kubectl -n agents-shared get configmap $AGENT-config -o yaml`). "
                          "Compare against KILLSWITCH.md section 4 invariants. Flag any drift "
                          "as P1 in /data/graphs/leo/pages/world/open-loops.md with a clear remediation. "
                          "Post a #homelab Matrix summary."
                      ),
                  },
                  # ─── Sibling deep-dives (frontier-pinned, daily) ───
                  # Frick (Ironclaw) and Vimes (Ironclaw) run their own
                  # routines via LiteLLM `chat` (Ironclaw routines have
                  # no per-routine model override). To give them a
                  # daily frontier-quality synthesis pass we route
                  # through Vetinari: Vetinari reads their graphs +
                  # journals + recent k8s events and produces the deep
                  # operational/security analysis they couldn't do
                  # themselves on a 32B local model.
                  {
                      "name": "cluster-deep-dive",
                      "cron": "30 5 * * *",
                      # Claude Sonnet via Max — the explicit purpose of this
                      # job ("the deep operational analysis they couldn't do
                      # themselves on a 32B local model") is exactly what
                      # the paid model exists for. Falls back to local
                      # `frontier` on Claude throttle.
                      "model_override": "claude-sonnet-max",
                      "timeout_secs": 900,
                      "enabled": True,
                      "message": (
                          "DAILY CLUSTER DEEP-DIVE (Claude Sonnet via Max subscription; falls back to local frontier on quota throttle). "
                          "Read Frick's recent journal "
                          "(/data/graphs/frick/journals/$(date +%%Y_%%m_%%d).md and the prior day's), "
                          "their pages/world/cluster-state.md, and pages/world/open-loops.md. "
                          "Pull last 24h of cluster events: "
                          "  kubectl get events -A --sort-by=.lastTimestamp | tail -200 "
                          "  kubectl top nodes "
                          "  kubectl top pods -A --sort-by=memory | head -30. "
                          "Identify: (1) capacity trajectory (CPU/RAM/GPU 7-day trend if data present), "
                          "(2) restart-loop or OOM patterns by namespace, "
                          "(3) anything Frick logged as needing follow-up but didn't escalate. "
                          "Write the synthesis to /data/graphs/leo/pages/world/cluster-state.md "
                          "(overwrite) and post a 5-bullet summary to the homelab Matrix room. "
                          "If a P1 emerges, append it to /data/graphs/leo/pages/world/open-loops.md."
                      ),
                  },
                  {
                      "name": "security-deep-dive",
                      "cron": "45 5 * * *",
                      # Claude Sonnet via Max — security pattern detection
                      # is materially better on Claude than on the local
                      # 32B Qwen MoE. Falls back to local `frontier`.
                      "model_override": "claude-sonnet-max",
                      "timeout_secs": 900,
                      "enabled": True,
                      "message": (
                          "DAILY SECURITY DEEP-DIVE (Claude Sonnet via Max subscription; falls back to local frontier on quota throttle). "
                          "Read Vimes' recent journal "
                          "(/data/graphs/vimes/journals/$(date +%%Y_%%m_%%d).md and the prior day's), "
                          "their pages/world/threats.md and pages/world/audit-log.md. "
                          "Pull last 24h of security signals: "
                          "  kubectl logs -n traefik deploy/traefik --since=24h | grep -E '4[0-9][0-9]|5[0-9][0-9]' | tail -100 "
                          "  kubectl logs -n authelia deploy/authelia --since=24h | grep -iE 'denied|fail|locked' | tail -50 "
                          "  any vimes-flagged events from fleet_events (severity p0/p1 + kind LIKE 'security.%%'). "
                          "Identify: (1) novel access patterns (new source IPs, new failed-auth clusters), "
                          "(2) any privilege-escalation or KILLSWITCH-class events, "
                          "(3) dependency CVEs Vimes has tracked. "
                          "Write the synthesis to /data/graphs/leo/pages/world/security-posture.md "
                          "(overwrite) and post a #homelab Matrix summary. "
                          "P0/P1 findings get appended to /data/graphs/leo/pages/world/open-loops.md "
                          "with a clear remediation."
                      ),
                  },
                  # ─── High-frequency loop (chat-pinned, dashboard builders) ───
                  {
                      "name": "sibling-pulse",
                      # 2026-05-15: dropped from */15 to */30. Sibling cron jobs
                      # mostly run at intervals of 30min+ (Sancho heartbeat 30m,
                      # Quirm bench-pulse */30, Frick/Vimes routines hourly), so
                      # a 15min pulse re-read the same journal lines twice with
                      # no new signal. */30 halves the chat-lane load (-48
                      # calls/day) while keeping dashboard staleness under 30m.
                      "cron": "*/30 * * * *",
                      "model_override": "chat",
                      # 2026-05-31: 6 siblings × (log tail + journal read) +
                      # dashboard append is ~12+ agentic steps; 90s starved it.
                      "timeout_secs": 300,
                      "enabled": True,
                      "message": (
                          "QUICK TASK (≤30s, no canonical-context reload). "
                          "For each of the six siblings (frick, frack, sancho, quirm, vimes, puck): "
                          "(a) get their pod's last log line via `kubectl -n agents-shared logs deploy/$NAME --tail=1` and "
                          "(b) check their last cron run from /data/graphs/$NAME/journals/ "
                          "(latest .md, last line). "
                          "Append one bullet per sibling to /data/graphs/vetinari/pages/world/dashboard.md "
                          "under a section ## Pulse <UTC timestamp> — overwrite any prior section newer than 60min. "
                          "Format: `- frick: <one-line>`. No prose, no synthesis. If a sibling is silent, write `silent`."
                      ),
                  },
                  {
                      "name": "fleet-events-tail",
                      "cron": "*/5 * * * *",
                      "model_override": "chat",
                      # 2026-05-31: 60s was too tight for the agentic loop
                      # (DB connect + query + conditional Matrix + file append
                      # across several `chat` round-trips). bench-watch logged
                      # "timed out after 60s" and auto-disabled. The `chat`
                      # model itself is fast (~0.2s/call); the cost is the
                      # multi-step tool loop, so give it real headroom.
                      "timeout_secs": 150,
                      "enabled": True,
                      "message": (
                          "QUICK TASK (≤20s). Connect to FLEET_DATABASE_URL and run: "
                          "SELECT severity, kind, source, target, summary, created_at "
                          "FROM fleet_events "
                          "WHERE created_at > now() - interval '5 minutes' "
                          "AND severity IN ('p0','p1','important','urgent') "
                          "ORDER BY created_at DESC. "
                          "If 0 rows, do nothing. Otherwise post a one-line bullet for each to the homelab Matrix room "
                          "and append to /data/graphs/vetinari/pages/world/dashboard.md ## Fleet section."
                      ),
                  },
                  {
                      "name": "open-loops-scan",
                      "cron": "*/30 * * * *",
                      "model_override": "chat",
                      # 2026-06-01: mission stall-chase removed (the
                      # mission-orchestrator CronJob owns it now). Two passes left:
                      # the sibling open-loops table + leo's open-loops aging.
                      "timeout_secs": 240,
                      "enabled": True,
                      "message": (
                          "QUICK SCAN — two passes, no synthesis or recommendations:\n"
                          "1) OPEN-LOOPS TABLE. Read /data/graphs/$AGENT/pages/world/open-loops.md for each "
                          "of frick, frack, sancho, quirm, vimes, puck. Count items, find any tagged "
                          "[p0] or [p1] created in the last hour. Update "
                          "/data/graphs/vetinari/pages/world/dashboard.md ## Open-loops section with a "
                          "7-line table (Agent | Total | P0 | P1 | Oldest).\n"
                          "2) OPEN-LOOPS AGING. In /data/graphs/leo/pages/world/open-loops.md, for each item "
                          "parse the first-line/front-matter `opened:` date. If opened > 3 days ago and "
                          "`closed:` is absent, tag it `[stale]`. If opened > 7 days, also send a Matrix DM "
                          "to Leo naming the item. Never delete or close anything — Leo decides."
                      ),
                  },
                  {
                      "name": "bench-watch",
                      "cron": "*/30 * * * *",
                      "model_override": "chat",
                      # 2026-05-31: cross-DB \connect + 2 queries + file update
                      # + conditional Matrix DM exceeded 60s; bumped to 180s.
                      "timeout_secs": 180,
                      "enabled": True,
                      "message": (
                          "QUICK TASK. Reach Quirm's hermes_quirm DB via FLEET_DATABASE_URL "
                          "(same postgres cluster, just \\connect): "
                          "SELECT count(*) FROM bench.findings WHERE seen_by_user=false AND severity IN ('important','urgent'); "
                          "SELECT model, prompt_id, summary FROM bench.findings "
                          "WHERE seen_by_user=false AND severity IN ('important','urgent') "
                          "ORDER BY created_at DESC LIMIT 5. "
                          "Update /data/graphs/vetinari/pages/world/dashboard.md ## Bench section. "
                          "If urgent (count>=3 OR severity='urgent') ping Leo via Matrix DM."
                      ),
                  },
                  {
                      "name": "kanban-tick",
                      "cron": "0 * * * *",
                      "model_override": "chat",
                      # 2026-06-01: DISABLED. Mission dispatch/reconcile/stall-chase
                      # moved to the deterministic `mission-orchestrator` CronJob
                      # (homelab argocd/apps/_agents/mission-orchestrator/). The
                      # LLM path was inert: shell_exec needs human approval (no
                      # exec_policy on this agent), the subprocess metacharacter
                      # guard rejects the inline curl/psql JSON, and file_write is
                      # sandboxed off /data/graphs. Kept here (disabled) only so the
                      # idempotent seeder deletes any previously-created live copy.
                      "timeout_secs": 60,
                      "enabled": False,
                      "message": (
                          "DISABLED — mission orchestration is owned by the "
                          "mission-orchestrator CronJob in the homelab repo. "
                          "This schedule is intentionally inert."
                      ),
                  },
                  {
                      "name": "drift-detect",
                      "cron": "0 */2 * * *",
                      "model_override": "chat",
                      # 2026-05-31: dashboard-vs-snapshot diff + conditional trigger.
                      "timeout_secs": 240,
                      "enabled": True,
                      "message": (
                          "Drift detection. Compare /data/graphs/vetinari/pages/world/dashboard.md "
                          "(current rolling state) vs /data/graphs/leo/pages/world/state-of-the-union.md "
                          "(last synthesized snapshot). If a sibling has gone from silent→active or "
                          "active→silent, or open-loop counts shifted by >5 since the last snapshot, "
                          "log a one-line entry to /data/graphs/vetinari/journals/$(date +%%Y_%%m_%%d).md. "
                          "If drift score is high (>=3 channels of change), enqueue a fresh "
                          "state-of-the-union run via POST /api/schedules/state-of-the-union/trigger."
                      ),
                  },
              ]

              # Index existing by name for idempotent upsert.
              by_name = {s["name"]: s["id"] for s in schedules}

              for spec in DESIRED:
                  if spec["name"] in by_name:
                      old_id = by_name[spec["name"]]
                      r = httpx.delete(f"{BASE}/api/schedules/{old_id}", headers=HEADERS, timeout=10)
                      print(f"deleted old {spec['name']} ({old_id}): {r.status_code}", flush=True)
                  payload = {
                      "name": spec["name"],
                      "agent_id": agent_id,
                      "cron": spec["cron"],
                      "message": spec["message"],
                      "enabled": spec["enabled"],
                      "timeout_secs": spec["timeout_secs"],
                      "model_override": spec["model_override"],
                  }
                  r = httpx.post(f"{BASE}/api/schedules", headers=HEADERS, json=payload, timeout=10)
                  print(f"created {spec['name']}: {r.status_code} {r.text[:200]}", flush=True)
                  r.raise_for_status()

              print(f"\\nseeded {len(DESIRED)} schedules. final list:", flush=True)
              for s in httpx.get(f"{BASE}/api/schedules", headers=HEADERS, timeout=10).json()["schedules"]:
                  print(f"  {s['name']:25s} cron={s['cron']:14s} enabled={s['enabled']}", flush=True)
              PY
              exec python /tmp/seed.py
          resources:
            requests: { cpu: "20m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
