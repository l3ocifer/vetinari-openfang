---
# Vetinari's Postgres database — declarative replacement for the
# `CREATE DATABASE openfang_vetinari` line that used to live in
# homelab-pg.yaml's postInitSQL (which only runs once at cluster
# bootstrap, so it was useless for adding/recreating the agent later).
#
# CNPG handles idempotency: re-applying just no-ops if the DB already
# exists with the right owner.
#
# The `vetinari` role MUST exist before this resource reconciles —
# bootstrapped by role-bootstrap-job.yaml (sync-wave -1).
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: openfang-vetinari
  namespace: databases
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  cluster:
    name: homelab-pg
  name: openfang_vetinari
  owner: vetinari
  ensure: present
  encoding: UTF8
  # Don't reclaim — irreplaceable agent state. If you delete the CRD,
  # leave the DB alone; recreate intentionally if needed.
  databaseReclaimPolicy: retain
