name: Bump shared docs submodule

# Triggered by repository_dispatch from l3ocifer/homelab when the
# shared persona docs change (AGENTS.md / HANDOFF.md / KILLSWITCH.md /
# USER.md). Bumps homelab/shared submodule pin to homelab repo's
# latest main and opens (or updates) an auto-PR.

on:
  repository_dispatch:
    types: [shared-docs-updated]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump submodule
        id: bump
        run: |
          cd homelab/shared
          OLD=$(git rev-parse --short HEAD)
          git fetch origin main
          git checkout main
          git pull origin main
          NEW=$(git rev-parse --short HEAD)
          cd ../..
          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          if [ "$OLD" = "$NEW" ]; then
            echo "Already at latest. Skipping."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update PR
        if: steps.bump.outputs.skip != '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OLD: ${{ steps.bump.outputs.old }}
          NEW: ${{ steps.bump.outputs.new }}
        run: |
          set -euo pipefail
          BRANCH="chore/shared-docs-${NEW}"
          git switch -C "$BRANCH"
          git add homelab/shared
          git commit -m "chore: bump shared docs ${OLD} → ${NEW}" \
            -m "Triggered by homelab repo shared-docs change. Pulls in updated AGENTS.md / HANDOFF.md / KILLSWITCH.md / USER.md."
          git push -f origin "$BRANCH"
          if gh pr view "$BRANCH" --json number > /dev/null 2>&1; then
            echo "PR exists; pushed updates."
          else
            gh pr create \
              --base main --head "$BRANCH" \
              --title "chore: bump shared docs ${OLD} → ${NEW}" \
              --body "Auto-generated from l3ocifer/homelab shared-docs update. Verify the new shared docs make sense for this agent before merging."
          fi
