name: GitHub fallback - Build & push GHCR image

on:
  # Forgejo is the primary CI/image path for homelab. Keep GHCR as an
  # emergency fallback without rebuilding on every Forgejo mirror push.
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vetinari-openfang
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for `git rev-parse` + tag resolution
          submodules: false  # framework source is at root; no submodules needed for build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Cargo + Buildx layers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            /tmp/.buildx-cache
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & (conditionally) push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: homelab/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE }}:homelab
            ${{ env.IMAGE }}:${{ steps.tags.outputs.sha }}
            ${{ steps.tags.outputs.version != '' && format('{0}:{1}', env.IMAGE, steps.tags.outputs.version) || '' }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          provenance: false  # cleaner image manifests for ArgoCD Image Updater
          build-args: |
            LTO=true
            CODEGEN_UNITS=1

      - name: Move buildx cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache 2>/dev/null || true
